services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - ./spec:/repo/spec
      - ./public:/repo/public
      - web_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REPO_ROOT: /repo

volumes:
  web_node_modules:
