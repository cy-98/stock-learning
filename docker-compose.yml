services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      # 仓库根挂载到 /repo，供 sync:spec、sync:feed 等脚本读取 spec/、docs/
      - .:/repo
      - web_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      REPO_ROOT: /repo

volumes:
  web_node_modules:
