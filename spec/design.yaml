    items:
      - heading: 数字锚点
        body: 合理区间由规则 + section-3 维护；AI 只解释假设，不单独「发明」价格。
      - heading: 热度 vs 估值
        body: 层热度与个股估值灯分离，避免「涨得多 = 值得买」。
      - heading: 未盈利股
        body: PS 法须低置信度与证伪条件（参考寒武纪等）。

