sections:
  - title: 本阶段范围
    list:
      - 产品目标：实时观察 + 判断是否偏贵 + 合理价格**区间**
      - 技术边界：浏览器 stock-sdk + 可选后端（财报/分位/AI）
      - 与五层模型、层热度、投资分析 Tab 的关系

  - title: 交付物
    list:
      - 数据模型（`ValuationProfile`、`ValuationVerdict`、`StockInsight`）
      - 架构图（实时层 / 锚点层 / AI 层 / UI）
      - **时事管道**：持久化 layer-feed vs 运行时 GDELT（见 automation 阶段）
      - AI 输出 JSON Schema 与刷新策略
      - 线框：层内 Top5、个股详情、Watchlist

  - title: 时事数据分层
    table:
      headers: [层级, 存储, 刷新, 用途]
      rows:
        - ["持久化", "docs/data/layers.json", "Cursor Automation 日更", "层页大事件/趋势、热度 30%"]
        - ["构建产物", "web/public/data/layer-feed.json", "npm run sync:feed", "前端静态 fetch"]
        - ["实时", "GDELT API", "用户打开层页", "新闻列表，不写仓库"]
        - ["实时", "stock-sdk", "浏览器轮询", "Top5 现价/K 线"]

