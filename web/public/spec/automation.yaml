callouts:
  - type: info
    body: |
      **职责分界**：`docs/data/layers.json` + `layer-feed.json` = 层内大事件/趋势（进热度、层页卡片）；
      各层 **GDELT 面板** = 用户打开页面时实时拉新闻，不纳入每日 commit。
  - type: warn
    body: |
      Automation 须绑定仓库 `cy-98/stock-learning` 并启用 **Open pull request**（推荐）或经你审核后合并；
      禁止在无人工策略时自动改写 `valuations.json` 合理价锚点。

sections:
  - title: 目标
    list:
      - 每个交易日（或每日固定时刻）拉取与五层模型相关的**宏观/行业时事**
      - 结构化写入 `docs/data/layers.json` 的 `events` / 必要时 `trends`
      - 运行 `npm run sync:feed` 与 `npm run build`，通过合并 PR 或 push `main` 触发 Pages 部署
      - 更新 `meta.updated` 与自动化运行摘要（可选 `docs/automation/last-run.md`）

  - title: 数据流（仓库内）
    table:
      headers: [步骤, 产物, 消费者]
      rows:
        - ["1 · Agent 调研", "docs/data/layers.json", "人工 diff / PR 审查"]
        - ["2 · sync:feed", "web/public/data/layer-feed.json", "LayerFeedContext、层热度 30%"]
        - ["3 · build", "web/dist/", "GitHub Pages"]
        - ["—", "GDELT API（运行时）", "GdeltNewsPanel，不进 build"]

  - title: Cursor Automation 配置要点
    list:
      - "**触发器**：Scheduled cron，建议 `0 0 * * *` UTC（北京时间 08:00）或工作日 cron"
      - "**仓库**：本仓库 `main` 分支；启用 **Open pull request**"
      - "**模型**：云 Agent（Automation 默认 Max Mode）"
      - "**指令**：见 `docs/automation/prompt.md`（完整可复制 Prompt）"
      - "**可选**：Memories 记录「上月已写入事件」避免重复；Slack 发送摘要"
      - "**计费**：按 Cloud Agent 用量；Team Owned 与 Private 账单归属不同（见官方文档）"

  - title: 与现有 CI 的关系
    paragraph: |
      `.github/workflows/pages.yml` 在 **push main** 时 `npm ci && npm run build` 并发布 gh-pages。
      每日 Automation 的标准路径是：**开 PR → 合并 main → 由 Actions 部署**。
      若 Automation 直接 push `main`，也会触发同一 workflow（需约束 commit 范围与消息格式）。
    list:
      - 构建前执行 `sync:feed`（已纳入 `npm run build`）
      - `npm run sync:spec` 已包含在 `build` 中，无需 Automation 单独改 spec YAML，除非同步改计划

  - title: 时事更新范围（Agent 契约）
    list:
      - 每层 `events`：新增 0–2 条**有日期、可核实**的条目；同月同标题不重复
      - 可选微调 `trends`：仅当有明显新研判；须带 `signal`（bullish / neutral / caution）
      - 更新 `meta.updated` 为运行日（`YYYY-MM-DD`）
      - **禁止**：编造具体股价、目标价；禁止修改 `fairLow` / `fairHigh`（属 valuations 人工锚点）
      - 中文为主；海外重大事件可中英并列

