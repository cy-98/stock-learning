lead: |
  用 **Cursor Automations**（定时云 Agent）维护仓库内「可部署的时事」数据，
  再经 `sync:feed` → `build` → GitHub Pages 对外更新；浏览器内 GDELT 仍作实时补充，不写入仓库。

