codeBlocks:
  - title: Automation Prompt 骨架（粘贴到 Cursor）
    lang: markdown
    code: |
      你是 stock-learning 仓库的每日时事维护 Agent。

      ## 范围
      - 只改：docs/data/layers.json（五层 events/trends/meta.updated）
      - 不改：web/src/**、valuations、section-*.md，除非我另行说明

      ## 步骤
      1. 阅读 docs/data/layers.json 与各层 layerGdelt 主题（web/src/config/layerGdelt.ts）
      2. 用 GDELT / 可信财经来源检索过去 24–72h 与五层相关要闻（勿编造）
      3. 每层最多新增 2 条 events：{ date, title, body }，date 用 YYYY-MM 或 YYYY-MM-DD
      4. 更新 meta.updated 为今日
      5. 在 web/ 目录执行：npm run sync:feed && npm run build（须通过）
      6. 提交分支，开 PR：标题 `chore(daily): layer feed YYYY-MM-DD`，正文列出新增事件清单

      ## 质量
      - 重复标题跳过；不确定的条目不写
      - PR 描述附「数据来源」一句话

  - title: event 条目结构（layers.json）
    lang: json
    code: |
      {
        "date": "2026-05-31",
        "title": "简短标题",
        "body": "一两句事实描述，避免投资建议"
      }
